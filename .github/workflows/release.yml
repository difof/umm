name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Artifact version label for a dry run
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.prepare.outputs.should_build }}
      should_publish: ${{ steps.prepare.outputs.should_publish }}
      version: ${{ steps.prepare.outputs.version }}

    steps:
      - name: Resolve release mode
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ "$tag" =~ ^v[0-9]+(\.[0-9]+){1,2}$ ]]; then
              echo "should_build=true" >> "$GITHUB_OUTPUT"
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
              echo "version=$tag" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Tag $tag is not a supported release tag; skipping release."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "version=$tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(jq -r '.inputs.version // ""' "$GITHUB_EVENT_PATH")"
          if [[ -z "$version" ]]; then
            version="dry-run-${GITHUB_SHA::7}"
          fi

          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "should_publish=false" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  verify:
    name: verify release commit
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ripgrep xdg-utils

      - name: Run test suite
        shell: bash
        run: go test ./...

  build:
    name: build (${{ matrix.target.id }})
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
    if: needs.prepare.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-amd64
            goos: linux
            goarch: amd64
            archive: tar.gz
          - id: linux-386
            goos: linux
            goarch: 386
            archive: tar.gz
          - id: linux-arm64
            goos: linux
            goarch: arm64
            archive: tar.gz
          - id: linux-armv7
            goos: linux
            goarch: arm
            goarm: "7"
            archive: tar.gz
          - id: darwin-amd64
            goos: darwin
            goarch: amd64
            archive: tar.gz
          - id: darwin-arm64
            goos: darwin
            goarch: arm64
            archive: tar.gz
          - id: windows-amd64
            goos: windows
            goarch: amd64
            archive: zip
          - id: windows-386
            goos: windows
            goarch: 386
            archive: zip
          - id: windows-arm64
            goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          GOARM: ${{ matrix.target.goarm }}
          ARCHIVE: ${{ matrix.target.archive }}
          TARGET_ID: ${{ matrix.target.id }}
        run: |
          set -euo pipefail

          dist_dir="dist"
          package_name="umm_${VERSION}_${TARGET_ID}"
          stage_dir="${dist_dir}/${package_name}"
          binary_name="umm"
          if [[ "$GOOS" == "windows" ]]; then
            binary_name+=".exe"
          fi

          mkdir -p "$stage_dir"

          export CGO_ENABLED=0
          export GOOS
          export GOARCH
          if [[ -n "${GOARM:-}" ]]; then
            export GOARM
          fi

          commit="${GITHUB_SHA}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags "-s -w -buildid= -X github.com/difof/umm/internal/version.Version=${VERSION} -X github.com/difof/umm/internal/version.Commit=${commit} -X github.com/difof/umm/internal/version.BuildDate=${build_date}" \
            -o "${stage_dir}/${binary_name}" \
            .

          cp LICENSE README.md "$stage_dir/"

          case "$ARCHIVE" in
            tar.gz)
              tar -C "$dist_dir" -czf "${dist_dir}/${package_name}.tar.gz" "$package_name"
              ;;
            zip)
              (
                cd "$dist_dir"
                zip -rq "${package_name}.zip" "$package_name"
              )
              ;;
            *)
              echo "unsupported archive format: $ARCHIVE" >&2
              exit 1
              ;;
          esac

          rm -rf "$stage_dir"

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target.id }}
          path: dist/umm_${{ needs.prepare.outputs.version }}_${{ matrix.target.id }}*
          if-no-files-found: error

  bundle:
    name: bundle release assets
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_build == 'true'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums and release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          cd dist
          files=(umm_*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "no release archives found" >&2
            exit 1
          fi

          sha256sum "${files[@]}" > SHA256SUMS.txt
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$VERSION" \
            -f target_commitish="$GITHUB_SHA" \
            --jq '.body' > generated-release-notes.md

          cp generated-release-notes.md release-notes.md

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - bundle
    if: needs.prepare.outputs.should_publish == 'true'

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-bundle
          path: dist

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$VERSION" dist/umm_* dist/SHA256SUMS.txt \
            --title "$VERSION" \
            --notes-file dist/release-notes.md
