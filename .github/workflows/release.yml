name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          BINARY="umm-${GOOS}-${GOARCH}"
          go build \
            -ldflags "-X github.com/difof/umm/internal/version.Version=${VERSION} -X github.com/difof/umm/internal/version.Commit=${COMMIT}" \
            -o "dist/${BINARY}" \
            .
          tar -czf "dist/${BINARY}.tar.gz" -C dist "${BINARY}"
          shasum -a 256 "dist/${BINARY}.tar.gz" >> dist/checksums.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: umm-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
