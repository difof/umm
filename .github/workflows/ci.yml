name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test-and-build:
    name: test and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ripgrep xdg-utils

      - name: Run test suite
        shell: bash
        run: go test ./...

      - name: Build
        shell: bash
        run: go build ./...
